<div class="vce-text-block"><div class="vce-text-block-wrapper vce" id="el-88119e99" data-vce-do-apply="all el-88119e99">
<h2 id="track"><strong>Check Card Payment Status & Redeem</strong></h2>
<p>💡 Insert your redeem ID to check payment status and access your card.</p>
</div></div>

<form id="statusForm">
<input style="border-radius:7px;" 
       type="text" 
       id="redeemIdInput" 
       placeholder="Insert Redeem ID" 
       required>
<br><br>
<button style="border-radius:7px;" type="submit">
Check Status
</button>
</form>

<div id="status-loading-spinner" style="display:none; text-align:center; margin-top:10px;">
<div class="spinner"></div>
</div>

<div id="statusResult"></div>

<script>
document.getElementById('statusForm').addEventListener('submit', async function(e){

e.preventDefault();

const redeemId = document.getElementById('redeemIdInput').value.trim();
const spinner = document.getElementById('status-loading-spinner');
const resultDiv = document.getElementById('statusResult');

resultDiv.innerHTML = '';
spinner.style.display = 'block';

try{

const response = await fetch(`https://api.paygate.to/crypto/cards/status.php?redeem_id=${redeemId}`);
const data = await response.json();

spinner.style.display = 'none';

if(!data.payment_status){
throw new Error("Invalid Redeem ID or API response");
}

/* Build result output */

let html = `
<h3>Order Status</h3>

<p><strong>Payment Status:</strong> 
<span style="color:${data.payment_status === 'paid' ? 'green' : 'red'};">
${data.payment_status.toUpperCase()}
</span></p>

<p><strong>Card Issuer Status:</strong> 
<span style="color:${data.card_issuer_status === 'completed' ? 'green' : 'orange'};">
${data.card_issuer_status.toUpperCase()}
</span></p>
`;

/* If card ready */
if(data.card_issuer_status === 'completed' && data.redeem_link !== 'N/A'){

html += `
<h4>Redeem Your Card</h4>

<div class="copy-text">
<input type="text" class="text" value="${data.redeem_link}" readonly>
<button onclick="copyText(this)">Copy</button>
</div>

<p style="margin-top:10px;">
<a href="${data.redeem_link}" target="_blank">
<button style="border-radius:7px;">Open Card</button>
</a>
</p>
`;

}else{

html += `
<p style="margin-top:10px; color:gray;">
Your card is not ready yet.  
If payment is marked as PAID, please wait while the card is being issued.
</p>
`;
}

resultDiv.innerHTML = html;

}catch(error){

spinner.style.display = 'none';
resultDiv.innerHTML = `<p style="color:red;">Error: Invalid Redeem ID</p>`;

}

});
</script></div>
</div></div></div></div>
</div></body>
